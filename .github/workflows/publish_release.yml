name: Publish Release

on:
  release:
    types: [published]

env:
  VERSION: ${{ github.event.release.tag_name }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  validate_release_branch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout zipline-pyspark repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release tag is on main
        run: |
          git fetch origin main --tags

          RELEASE_COMMIT=$(git rev-list -n 1 "$VERSION")
          if ! git merge-base --is-ancestor "$RELEASE_COMMIT" origin/main; then
            echo "Release tag $VERSION points to $RELEASE_COMMIT, which is not contained in main."
            echo "Publish releases from tags created from main only."
            exit 1
          fi

  build_python_wheel:
    runs-on: ubuntu-latest
    needs: [validate_release_branch]
    steps:
      - name: Checkout zipline-pyspark repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python wheel
        id: build-dist
        run: |
          python -m pip install --upgrade pip
          python -m pip install build "setuptools_scm[toml]>=8"

          VERSION_NO_V=${VERSION#v}
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_ZIPLINE_PYSPARK=$VERSION_NO_V python -m build --wheel --no-isolation

          EXPECTED_WHEEL="zipline_pyspark-${VERSION_NO_V}-py3-none-any.whl"
          if [ ! -f "dist/$EXPECTED_WHEEL" ]; then
            echo "$EXPECTED_WHEEL not found"
            exit 1
          fi

          echo "wheel_file=$EXPECTED_WHEEL" >> "$GITHUB_OUTPUT"

      - name: Upload Python Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: zipline-pyspark-wheel
          path: dist/${{ steps.build-dist.outputs.wheel_file }}

    outputs:
      wheel_file: ${{ steps.build-dist.outputs.wheel_file }}

  publish_to_pypi:
    runs-on: ubuntu-latest
    needs: [build_python_wheel]
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download Python Wheel Artifact
        uses: actions/download-artifact@v4
        with:
          name: zipline-pyspark-wheel
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
