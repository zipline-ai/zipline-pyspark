name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pre-commit
      # SKIP=pytest: tests run in their own job; all other hooks are checked here.
      - run: SKIP=pytest pre-commit run --all-files

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install build "setuptools_scm[toml]>=8"
      # --no-isolation uses the current env's setuptools; avoids installing
      # runtime deps (including private ones) just to verify the package assembles.
      - run: python -m build --no-isolation

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install "pyspark>=3.5" zipline-ai pytest pytest-cov
          pip install --no-deps -e .
      - run: pytest tests/ -v
        env:
          SPARK_LOCAL_IP: "127.0.0.1"
