name: Sync Labels

on:
  push:
    branches: [main]
    paths:
      - .github/labels.json
      - .github/workflows/sync_labels.yml
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync semantic version labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const labels = JSON.parse(fs.readFileSync(".github/labels.json", "utf8"));

            for (const label of labels) {
              const params = {
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label.name,
                color: label.color,
                description: label.description,
              };

              try {
                await github.rest.issues.updateLabel(params);
                core.info(`Updated label: ${label.name}`);
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel(params);
                core.info(`Created label: ${label.name}`);
              }
            }
